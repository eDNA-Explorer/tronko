name: Tests

on:
  push:
    branches: [ main, experimental, develop ]
  pull_request:
    branches: [ main, experimental ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          zlib1g-dev \
          lcov \
          valgrind
    
    - name: Setup Unity testing framework
      run: |
        cd tests
        if [ ! -d "unity" ]; then
          git clone https://github.com/ThrowTheSwitch/Unity.git unity
        fi
    
    - name: Build tronko-build
      run: |
        cd tronko-build
        make clean && make
    
    - name: Build tronko-assign
      run: |
        cd tronko-assign
        make clean && make
    
    - name: Run unit tests
      run: |
        cd tests
        make -f Makefile.simple test
    
    - name: Generate coverage report (if supported)
      run: |
        cd tests
        if make -f Makefile.simple coverage 2>/dev/null; then
          echo "Coverage report generated"
        else
          echo "Coverage not available with simple Makefile"
        fi
      continue-on-error: true
    
    - name: Upload coverage to Codecov
      if: success()
      uses: codecov/codecov-action@v4
      with:
        files: ./tests/coverage.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          zlib1g-dev \
          valgrind
    
    - name: Build tronko-build
      run: |
        cd tronko-build
        make clean && make
    
    - name: Build tronko-assign
      run: |
        cd tronko-assign
        make clean && make
    
    - name: Run integration tests
      run: |
        cd tests
        make -f Makefile.simple test_simple_workflows
        ./test_simple_workflows
    
    - name: Run example dataset tests
      run: |
        chmod +x test_with_example_data.sh
        timeout 300 ./test_with_example_data.sh || echo "Test completed (may include expected crashes)"
    
    - name: Memory leak check with Valgrind
      run: |
        cd tronko-assign
        valgrind --leak-check=full --show-leak-kinds=all --track-origins=yes \
          ./tronko-assign -r \
          -f ../tronko-build/example_datasets/single_tree/reference_tree.txt \
          -a ../tronko-build/example_datasets/single_tree/Charadriiformes.fasta \
          -s \
          -g ../example_datasets/single_tree/missingreads_singleend_150bp_2error.fasta \
          -o valgrind_test_results.txt \
          -w || true
  
  comprehensive-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          zlib1g-dev \
          valgrind \
          lcov
    
    - name: Setup Unity testing framework
      run: |
        cd tests
        if [ ! -d "unity" ]; then
          git clone https://github.com/ThrowTheSwitch/Unity.git unity
        fi
    
    - name: Build binaries
      run: |
        cd tronko-build && make clean && make
        cd ../tronko-assign && make clean && make
    
    - name: Run comprehensive test suite
      run: |
        cd tests
        echo "=== Running Unit Tests ==="
        make -f Makefile.simple smoke
        
        echo "=== Running Integration Tests ==="
        make -f Makefile.simple test_simple_workflows
        ./test_simple_workflows
        
        echo "=== Running Functional Tests ==="
        cd ..
        chmod +x test_with_example_data.sh
        timeout 300 ./test_with_example_data.sh || echo "Functional tests completed (may include expected crashes)"
    
    - name: Crash debugging verification
      run: |
        echo "Verifying crash reports were generated..."
        ls -la /tmp/tronko_assign_crash_*.crash 2>/dev/null || echo "No crash files found (tests may not have triggered crashes)"

  docker-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t tronko:test .
    
    - name: Run Docker-based tests
      run: |
        docker run --rm -v $PWD:/workspace tronko:test bash -c "
          echo '=== Building in Docker ===' &&
          cd /workspace/tronko-build && make clean && make &&
          cd /workspace/tronko-assign && make clean && make &&
          echo '=== Running unit tests in Docker ===' &&
          cd /workspace/tests && make -f Makefile.simple smoke &&
          echo '=== Running integration tests in Docker ===' &&
          make -f Makefile.simple test_simple_workflows && ./test_simple_workflows &&
          echo '=== Running functional tests in Docker ===' &&
          cd /workspace && chmod +x test_with_example_data.sh && 
          timeout 300 ./test_with_example_data.sh || echo 'Docker tests completed'
        "

  performance-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/experimental')
    needs: comprehensive-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential zlib1g-dev time valgrind
    
    - name: Build optimized binaries
      run: |
        cd tronko-build && make clean && make
        cd ../tronko-assign && make clean && make
    
    - name: Performance benchmark
      run: |
        cd tronko-assign
        echo "=== Performance Benchmarks ==="
        
        echo "Performance test - Single-end reads:"
        /usr/bin/time -v ./tronko-assign -r \
          -f ../tronko-build/example_datasets/single_tree/reference_tree.txt \
          -a ../tronko-build/example_datasets/single_tree/Charadriiformes.fasta \
          -s \
          -g ../example_datasets/single_tree/missingreads_singleend_150bp_2error.fasta \
          -o perf_single_results.txt \
          -w -V 0 2>&1 | tee perf_single.log
        
        echo "Performance test - Paired-end reads:"
        /usr/bin/time -v ./tronko-assign -r \
          -f ../tronko-build/example_datasets/single_tree/reference_tree.txt \
          -a ../tronko-build/example_datasets/single_tree/Charadriiformes.fasta \
          -p \
          -1 ../example_datasets/single_tree/missingreads_pairedend_150bp_2error_read1.fasta \
          -2 ../example_datasets/single_tree/missingreads_pairedend_150bp_2error_read2.fasta \
          -o perf_paired_results.txt \
          -w -V 0 2>&1 | tee perf_paired.log
        
        echo "=== Performance Summary ==="
        echo "Single-end performance:"
        grep -E "(User time|System time|Maximum resident set size)" perf_single.log || echo "Performance data not available"
        echo "Paired-end performance:" 
        grep -E "(User time|System time|Maximum resident set size)" perf_paired.log || echo "Performance data not available"
    
    - name: Upload performance logs
      uses: actions/upload-artifact@v4
      with:
        name: performance-logs
        path: |
          tronko-assign/perf_*.log
          tronko-assign/perf_*.txt
      if: always()